# Netlify configuration for MMS Power Index

[build]
  publish = "."

# Never cache the data file — updates should appear immediately
[[headers]]
  for = "/rankings.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache history snapshots either
[[headers]]
  for = "/history/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache HTML briefly so redeploys propagate quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
