# Netlify configuration for MMS Power Index
# Drop this file in the root of your repo alongside index.html.

[build]
  # No build step — this is a static site.
  publish = "."

# Prevent caching of the data file so weekly updates appear immediately.
[[headers]]
  for = "/rankings.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache the HTML briefly (5 minutes) so Netlify still serves it fast,
# but new deploys propagate quickly.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
